<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My task</title>
   <link rel="stylesheet" href="assets/css/style.css">
  
</head>
<body>
  <div class="container">
    <h1>To-do list</h1>

    <!-- Mensaje de bienvenida temporal (solo una vez por sesión) -->
    <div id="bienvenida" class="mensaje"></div>

    <!-- Formulario para agregar tarea -->
    <div class="formulario">
      <input type="text" id="txtTarea" placeholder="Add new task...">
      <button id="btnAgregar">Add</button>
    </div>

    <!-- Botones de filtro -->
    <div class="filtros">
      <button data-filtro="todas" class="filtro-activo">All task</button>
      <button data-filtro="pendientes">To-do</button>
      <button data-filtro="completadas">Done</button>
    </div>

    <!-- Lista de tareas -->
    <ul id="listaTareas"></ul>
  </div>

  <footer>
    <div class="footer-content">
      <p>created by Luis Medrano and Alejandra Jimenez</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>


</body>
</html>
