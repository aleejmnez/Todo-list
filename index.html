<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My tasks</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      flex: 1;
    }
    footer {
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-do list</h1>

    <!-- Mensaje de bienvenida (solo una vez por sesión) -->
    <div id="welcomeMessage" class="mensaje"></div>

    <!-- Formulario para agregar tarea -->
    <div class="formulario">
      <input type="text" id="taskInput" placeholder="Add new task...">
      <button id="addButton">Add</button>
    </div>

    <!-- Botones de filtro -->
    <div class="filtros">
      <button data-filter="all" class="filtro-activo">All tasks</button>
      <button data-filter="pending">To-do</button>
      <button data-filter="completed">Done</button>
    </div>

    <!-- Lista de tareas -->
    <ul id="taskList"></ul>
  </div>

  <footer>
    <div class="footer-content">
      <p>created by Luis Medrano and Alejandra Jimenez</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
